body:
  text: 善夢敬擷録敬本教興篇第一自法王之利見也必以靜見為先故論云何處何時誰起此見一切諸見悉斷故文良證也然則習熏日久取會無由事須立敬設儀開其信首之法附情約相顯於成化之功然後肝膽塗地形骸摧折知宇宙之極尊則敬逾天屬曉教義之遠大則道越常途觀斯以言則識形心兩途事理雙軌形則縛於俗習苦陰常纏故當折挫以歸依剖析剖析觀其慢惑也心則封於迷倒倒在生常故須鏡生滅以懲之追想追想知其妄著也固當撫攬誠教以法糾懲則生身不徒委於下塵無識不徒生於上趣矣濟時護法篇第二夫以立像表真恆俗彝訓寄指筌月出道常規但以妄想倒情相沿固習無思悛革隨業漂淪是以經言為善若登清升若爪之土為惡若崩沈滯如下之地此言在斯誠為極誡所以大聖知時通化陶誘立正三寶導濁識之所歸開明四印示迷生之不昧固得住法萬載功由歸敬之勳神升四天諒藉傳揚之力廣如慈經所出豈虛構哉今於此篇顯三寶相相隨見起隨機四位初謂一體二謂緣理三謂化相四謂住持各有名相初言一體三寶者一是非二之名體謂本識之謂但以無始心體性淨如空妄想客塵封迷隨染致使相從至於今日經生歷死無由厭曉行者既知心性本淨悟解無邪名為正覺覺即佛也性淨無染法也性淨無壅僧也今覺於本名始覺也本實體淨名先覺也如此安心如此練身俯仰周循無念不剋問曰卿發斯言欲何標據念念總是識心言言都非智略如何依準得一舉而騰九萬耶答曰夫以聖道遠而難希淨心近而易惑為山基於一簣為佛起於初念故萬里之剋離初步而不登三劫之功非始心而罔就是知行人發足常步此心開示不由外來悟入誠因內起迷時謂禮外境悟已還禮自心故經云心想佛時是心是佛如是斂念會必精勤積熏不已自然清淨忘此外求甫當行道徒役身心終為世福二明緣理三寶者理謂至理天真常住還是心體且從染說無始有終但為惑網不能出障今以三學剋翦纏結惑業既傾心性光顯始終性淨無始無終由法成立隨境分相即號此相為五分法身謂戒定慧解脫解脫知見也前之三學從因受名由戒護助果成法身故云戒身定慧準此可以類知後二從果次第受名解脫身者由慧剋惑惑無之處名解脫身解脫知見乃以出纏破障反照觀心故云知見身也唯佛法中三乘聖者具此五分能為六道作大歸依故論云歸依於佛者謂一切智五分法身也歸依於法者謂滅諦𣵀槃也歸依於僧者謂諸賢聖學無學功德自身他身盡處也即自他惑滅所無之處故云盡處也由此三寶常住於世不為世法之所陵慢故稱寶也如世珍寶為生所重今此三寶為諸羣生三乘七衆之所歸仰故名正歸或即名之同相三寶由理通三世義盡十方常住三寶此為至極經云若人得聞常住二字是人生生不墮惡趣斯何故耶以知法佛本性常故一時聞解熏本識心業種既成淨信無失況能立願歸依奉為師範固當纍劫清勝義無陷沒如經有人受三歸依彌勒初會解脫生死此乃出苦海之良津入佛法之階位但以罪多惡重輕而慢者雖曾受歸隨緣還失是故智人初受歸時專心緣此得名歸依故感善神隨逐護助上明佛竟後之二寶緣此而生如前廣敘以開靈府此理三寶能生化相弘道利生罪福通感以化佛無心猶如光焰儀像非情體唯無記所感罪福還約法身由顯相狀法身依故以法本非形無漏無色不以相顯羣有何依故立像表真厥趣斯矣是知化佛供毀一自法身無有興亡獨稱常住言極繁矣意在通之此明理寶是歸依所宗故覆詳之令心有寄故出曜云道之在心不問老少唯在剛烈乃名道耳信心以存何往不剋文良證也可不鏡哉三明化相三寶者謂釋迦如來為佛寶也所說滅諦為法寶也先智苦盡為僧寶也此化相三寶或名別相體是無常四相所遷滅過千載但可追遠用增翹敬四明住持三寶者人能弘道萬載之所流慈道假人弘三法於斯開位遂使代代興樹處處傳弘匪假僧揚佛法潛沒至如漢武崇盛初聞佛名既絶僧傳開緒斯竭及顯宗開法遠訪華胥致有迦竺來儀演布聲教開俗成務發信歸心實假敷說之勞誠資相狀之力名僧寶也所說名句表理為先理非文言無由取悟故約名教說聽之緣名法寶也此理幽奧非聖不知聖雖云亡影像斯立名佛寶也但以羣生福淺不及化源薄有餘資猶逢遺法此之三寶體是有為具足漏染不足陳敬然是理寶之所依持有能尊重相從出有今不加敬更無尊重之方投心何所起歸何寄故當形敬靈儀心存真理導緣設化義極於斯經云造像如麥獲福無窮以是法身之器也論云金木土石體是非情以造像故敬毀之人自獲罪福莫不表顯法身致令功用無極故使有心行者對此靈儀莫不涕泣橫流不覺加敬但以真形已謝唯見遺蹤如臨清廟自然悲肅舉目摧感如在不疑今我亦爾慈尊久謝唯留影像導我慢幢是須傾屈接足而行禮敬如對真儀為我說法今不見聞心由無信何以知耶但心用所擬三界尚成豈此一堂頑癡不動大論云諸佛常放光說法衆生無始罪故對面不見又作是念見雖是色了色心生心外無塵名為真觀言從心起實唯識有名為俗觀漸次增明念念無絶時功既積熏習逾增觀道修明不迷緣假名願樂位修道人焉隨機立教篇第三恐好事者須稟教量故出一二用弘其道道貴清通義非壅結仍須識分以自揣摩無容冒罔自謂超挺生報茫然孰識夷險必有斯人則自溺苦海誰能濟拔今約兩緣立儀表行入道多門不過理事理謂道理通聖心之遠懷事謂事局約凡情之延度聖非自聖終假導而漸明凡非定凡亦因開而達解是知愚智深淺賢聖位階由解行之遠近致利鈍之乖異然使鈍士依事引方土之歡娛且以安身身安而後道也利人行理剋正念而濯性靈用以清心心清而出有也然利鈍千差昏明等級薄知綱領標控神解故歷諸篇通斯一致則披者不昧於由徑行者無滯於發足矣乘心行事篇第四上已顯其機緣心行備矣識真俗之交務鑒現事現事或應作理事之相由文明祖習之經義曉疏通之理至於附相行事故習難傾三賢猶染其塵四果尚迷斯旨是以迦葉起舞舍利作瞋難陀悅於練色陵伽興於慢相斯並正使雖盡餘習未亡猶增惱於六塵自網弊於三受況乃下凡煩惑無始習熏今生道種正論倫而不忍以斯昏濁徒生徒死甚可惜哉若夫心塵使性知誰不無識則無邪常須節約若任而縱者無解脫期故經譬覺賊論示御心制之一處無事不辦豈虛纍哉下凡煩惱微細難知粗而易覺勿過三毒自毒毒他深可厭患貪瞋一發業構三塗癡慢為本故增垢結故論云三三合九種謂身口意此三能起業也自作教他見作隨喜此三能成業也現報生報後報此三名業果也從三煩惱起以此文證故知起業必由毒生常須觀度方識毒相故使行福而雜罪者還承惡因惡道雜受故大丈夫論云修行大布施急性多瞋怒不惟正憶念後作大力龍修施陵懱人後生金翅鳥施本捨慳故感財報瞋心行事還興毒害故受龍形見觸傷等三種害物並由瞋生況今行敬本為除慢更增慢墮已是業科復起貪瞋明招苦報然凡所作業三性為宗一俯一仰非心不就心必依緣緣通內外不起則已起必性收善惡兩性作業感生無記之緣多歸癡種種雖無記亦有善惡夢業受生如論具引是知捨受昏蒙難為醒決故當臨事籌理必不陷溺清心寄緣真俗篇第五真俗二諦由來尚矣不由功用任運現前故論云諸佛說法常依二諦今時行敬亦準聖言不虛設也然須達解兩諦所由故論云知塵無所有通達真知唯有識通達俗若不達俗無以通真若不通真無以遣俗以俗無別體故也正論成觀令人受行但以無始倒凡隨情妄執約相猶迷邪正何能頓遣見聞所以大聖觀機未得垂道權說福業用接愚心故舉淨方之勝相發動迷心之背向且攝邪心令從正法漸漬既久心性轉明方示非真令行理觀據此修捨實是知機若彼下愚未聞真道即為化說色聲非真心路蒼茫莫知投寄福業不行道心無涉遂即雙廢長處罪流由此方便引令出有但此下愚貪滯難拔縱任想像何時通悟故行事福漸行理觀身本頑癡不可繩持心是道因從緣便悟謂此形儀本唯識有迷於本習妄見我人故須徵研令行敬養令見我身俯仰上下唯塵生滅來往屈申此隨俗也重觀此身但塵非我妄謂我所能有行敬據此一理名通真也真本非心今隨心起名隨俗也知真非心名通真也如是念念以後奪前漸漸增明久而明利若隨故習忽此不修還同無始生死輪轉是以力勵隨念剋思一一科程令其升進理事行務且隔形心至於動用真俗並觀所以隨其發足畢約兩緣知無顯真知識是俗種從緣起方可有階若身心兩分真俗二路三倒常行革凡何日有人心路慞惶情投莫準聞余及此勃爾興言撫掌大笑曰言何容易一何虛誕嗟乎不學浪有涉言吾聞真俗並觀登住方修如何下凡僭他上聖理義不可急須改之余曰不可改也發心畢竟初後心齊唯識四位凡聖通學今則在凡不學何有剋聖之期故須發足並修修明自然位聖是知修道行人常觀正理不可執文便乖義實故四依檢失念念準承當須依智不依於識識俗所習智是道筌聖立正儀無容輒濫引教徵事篇第六今立正儀行敬須本教宗教有權實不同行亦昏明殊則先須通其立本然後附本興懷可也經說四依區分三位足為末代之龜鏡信是衆行之宗師大聖致詞終不徒設準教行事畢正無邪初人四依謂從初賢至於極聖人資無漏法體性空據此依承理無邪倒但以無相好佛尚惑魔形況有識凡夫能無受亂故立法依顯成楷定初明依法不依人者人唯情有法乃軌模性空正理體離非妄即用此法為正法依𣵀槃極教盛明斯轍二明依義不依語者語是言說止是張筌義為達理化物之道證解已後絶慮杜言法尚應捨何況非法三言依智不依識者識謂現行隨塵分見眼色耳聲耽迷不覺與牛羊而等度同邪凡而共行大聖示教境是自心下愚冰執塵為識外所以化導無由捨之是知滯歸凡識倒遣聖心愚迷履歷常淪三倒勇勵特達念動即知知倒難清名為依識知流須返名隨分智如是加功漸增明大後見塵境知非外來境非心外是自心相安有愚迷生憎生愛思擇不已解異牛羊但出聖道無始未經今欲革凡理變恆習自揣形服都非俗流如何想觀全乖道望誠可笑也四依了義經不依不了義經者此之兩經並聖言量凡入道者率先曉之則無壅不通有疑皆決但為羣生性識深淺利鈍不同致令大聖隨情別說然據至道但是自心故經云三界上下法我說唯是心此就世界依報以明心也又云如如與真際𣵀槃及法界種種意生身佛說唯心量此據出世法體以明心也終窮至實畢到斯源隨流赴感還宗了義故佛以法約定權機何以知然且如欲有亂善體封下界經中有說為不動業及以成佛並非了義以此凡愚少厭欲苦令修淨觀多生退沒故隨意樂說為道業然其此業因亂果定核其修證成相似報得生善趣事淨國土終非事業剋於佛果後因前業重更修明靜智澄清方遂前願故論云若有誦持多寶佛名得生淨土者別時遠意行四依者律中自明三乘行者通所資用所謂納衣乞食樹下塵藥各有開制如常共傳約時科節篇第七夫為務學之士無時不行固得念念策心新新習起豈可前念背惡遂剋苦而靜塵後念陵善復縱意而揚怠所以論美四修謂長時無間恭敬無餘也經歎一慮謂行住食息常爾一心也然後方能正想革絶凡懷大聖立教卓出恆倫序其指歸終為離著至於隨境流觀陶甄性靈廣張聲教都唯可學學在三位以攝教源祖而修奉不越斯位乃至分時督課前修舊行日夕三時禮悔相續可謂儀形有據不墜彝倫外攝羣小開俗信於未然內斂恆情增天龍之護助若此行之不徒設也且禮念之法自有威儀三學言歸俗多分異元立三學同傾一惑為宗以三征之不可分為三別如論所云戒如捉賊定如縛賊慧如殺賊明喻即目何用深思尋喻乃三約賊唯一事分三義宗成一滅故重張之意存通領且如禮敬一法用息慢高如不屈躬斯名犯戒常念在心斯學定也常知無我斯名慧也一敬如此餘行同然是則萬行殊途三學攝盡今學教者皆三別蹤又執自計以破他部擬前喻說理不容非固須一事沿修隨公三學更為重顯如佛立戒無境不修名作持惰名止犯犯從止起畏犯修持持名隨戒戒名警策是為戒學安心此學非定不行名定學也深思此學為滅倒情縱而不學還順生死為絶苦本非學不明力勵徵責名慧學也如此漸境漸境託心凡倒漸輕聖解漸厚積功不已無往不成千里一步如前具述時序可惜無容自欺威容有儀篇第八俗中周禮有九品之拜出自太祝之官斯非內教今據內教以禮敬為初大略為二即身心也佛法以心為其本身為其末故須菩提靜觀室內如來歎為禮見法身華色初至寶階如來毀為拜於化佛故知靜處思微念念趣道觀形鑒貌新新在俗能所未免想見齊生我倒現前即為障道故佛約此而分身心敬也如能即色緣空觀境心造紛紛集起不無染淨知識妄念未可清澄想倒空時緣念斯絶今居凡地力極制御止得如斯念念自然漸能清淨常起兩觀不得單行謂知無境是漸向真謂知唯識是漸背俗如此策修長時不已分分增明三祇方就前已明訖數數須知經中明敬有衆位之差至於律制頗亦殊倫勒那三藏見此下凡悲心內充為出七種禮法文極周委鈔略出之初名我慢禮者謂依次位心無恭敬高尊自德無師仰意恥世下問咨受無所心無法據如碓上下一形所作無境住心輕生薄道徒勞無益外覩似禮內增慢惑猶如木人情不殷重手不至地五輪不具此是慢業名我慢禮二唱和禮者雖非慢高心無淨想粗正威儀身心虔敬起伏相順片有相扶其福薄少非真供養三身心恭敬禮者聞唱佛名便念佛身如在目前相好具足莊嚴晃曜心相成就實對三身申手摩頂除我罪業是以形心恭敬無有異念供養恭敬情無厭足是名境界禮佛心眼現前專注無昧此人導利人天為上為最功德雖大未是智心後多退沒四發智清淨解達佛境界禮佛者行者慧心明利深知法界本無有礙由我無始順於凡俗非有有想非礙礙想今達自心虛通無礙故行禮佛隨心現量禮於一佛即一切佛一切佛即一佛以佛法身通同無礙故禮一佛遍通一切如是種種香華供養例同於此法僧加敬義亦同之以三寶同性理無異故三乘名異解脫牀同故知一禮即一切禮一切禮即一禮如是三寶既能通達一切三界六道四生同作佛想供養禮拜自淨身心蕩蕩無障念佛境界心相轉明一拜一起為尊為勝是名真實果報殊大由心無限故使淨業無窮五明遍入法界禮敬供養者行者想觀自己身心法從本已來不在法界佛法身外亦知諸佛身心法不在我身外發解冠達自身一切身遍滿法界是名法界不增不減清淨法門如是解了故知我今禮於一佛一佛之身遍於法界法界之中所有三界位地無漏法身皆有佛身佛身既遍一切我身隨佛亦遍一切所以禮敬供養一切身中具足莊嚴如此行學法界法門大有利益終至此解不學不知是故行人常須緣觀所得功德不可校量既知我身在佛身內如何顛倒妄造業耶六明正觀禮自身佛不外緣境他佛他身何以故一切衆生自有佛性平等滿足隨順法界緣起熾然但為迷解有外可觀所以妄倒常淪生死若能返照解脫有期若向他境謂有可觀邪人邪行經教不許故云不觀佛不觀法不觀僧以見自己正法性故又云色聲見我名行邪道是故行人常行禮拜但見身心有禮有敬未能通解常厭常行後一通達知心無外方識自心清淨本性此即自性住佛性也隨力修明引出佛性也三祇果圓十地位極至得果佛性也此解微妙唯聖達之位在下凡不宜不解不修習也七明實相三寶自他平等禮者大意同前前猶有禮有觀自他兩異今此無自無他佛凡一如古今無別見佛可禮大邪見人經云觀身實相觀佛亦然以實相離念不可以心取不可以相求不可以禮敬不可不禮敬禮不禮等供不供等安心寂滅名平等禮故文殊十禮云不生不滅故敬禮無所觀此後二禮寂而能通福而行道故使止觀雙遊真俗並運心乃虛蕩身實纍緣在凡行學其相齊此功用顯迹篇第九今欲親覲諸佛聞出世法作何方便修行正行以凡無始約相修福故還約相行遠離法所以先置道場安設尊像幡蓋華香隨力供養有十種相見佛善根一者禮拜二者讚歎三者發願回向四者觀佛相好五者專念修慈六者三歸十善七者發菩提心八者讀誦經戒九者供養舍利造佛形像十者修行正觀修行正觀者至理真極不越人法二空唯佛道有餘道則無由人法二空則二執斯斷一切煩惱無因得生故金剛般若云一切聖人皆以無為得名此謂三乘聖賢深淺有異至於入證唯在二空行者修習當依地持論云修行法者託虛寂靜身不遊行口默少言少睡多覺常一坐食不雜種食思量如來所說諸法知非有無以其所知遍通諸法令得善解以此文證行者須知觀察自心從本已來自性清淨非空非有非染非淨離諸分別但為妄想致有是非得失罪福因之增長今達本性可謂還源常作此觀不見人法即是達空空本無形如何起妄如是一切作業動身運想不得失念如上已明此是實觀餘名虛解華嚴經云觀察諸法及衆生國土世間悉寂滅心無所依無妄想是名正念佛菩提又云若欲得佛智當離諸妄想有無俱通達疾作天人師行者修行此觀一時一念功德無邊故迦葉經云大千衆生所有福德如彌尼王不如有人修遠離法淨心相應解諸法空無來無去如是少忍功德非譬喻所能及之又普賢觀經云若有晝夜六時禮十方佛誦大乘經思第一義甚深空法一彈指頃除百萬億那由他恆河沙劫生死之罪行此法者真是佛子從諸佛生十方諸佛及諸菩薩為其和尚是名具足菩薩戒者不須羯磨自然成就應受一切人天供養程器陳迹篇第十余年侵蒲柳旦夕待盡非業莊嚴何假傍及又述撰行相其徒實繁隨時救急總撮亦備今有觀方志道相從問津季代常徒禮敬為切領余撰録擬用針銘不堪苦及遂復陳敘凡此十篇止存三業上弘佛道下攝自他詞甚丁寧義存遣著庶其覽者知其意焉如或有虧請俟針誨龍集庚辰九月十七日録竟唯備自覽故多闕遺未足流布傳示時賢也沙門善夢時六十又一居梵華精舍別録四則智度論云外道是他法故來則自坐白衣如客法故命之令坐一切出家五衆身心屬佛故立不坐若得道羅漢如舍利弗等皆坐聽法三果已下並不聽坐以所作未辦結賊未破故今有安坐像前情無敬讓可謂無事受罪枉壞身心如上三果尚立況下凡乎像立而坐彌是不敬比今君父可以例諸此言易矣臨機難哉常志在心努力制抑方可改革不爾雖讀不救常習思之惟之依教修習慈悲四無量心何故如是以諸佛心所謂大慈今不修習行不同佛無由得見故念佛時行修慈觀行者初心欲修慈時間處端坐繫念十方一切衆生皆如己親無恚礙想以上妙具四事供給或一念頃一時一日能生功德隨心分量不可限故大集經云若修慈者當捨命時見十方佛手摩其頂蒙手觸故心安快樂尋得往生清淨佛土余見世間性行柔軟臨終安隱如意自在本性粗疏臨終荒忽眼光先落失音不語雖有善教不相領解即事以求行慈為極今忽不行止是惡業無慈悲心須投惡道若修法緣無緣慈者具四無量獲得佛道發菩提心者菩提云覺自覺覺他故名佛也行者既在佛法即佛種子須發覺求作意觀度此乃趣佛果之津梁成萬行之根本如空之含萬像若海之納百川若不先建此心起行則便迷沒是菩提者其相如何今欲發心有理有行在緣乃二於義則通不爾真俗兩乖非正法義言理發者即是自心五陰諸法本性無我深知此要名菩提心故淨名云寂滅是菩提離諸相故假名是菩提名字空故又如問菩提經云菩提相者出三界過俗法言語斷滅諸發無發是名發菩提心如是衆經例遣相心故名發心謂此心體本清淨究達此理作業令淨故曰發心即名行也行者如上安止心已生大欲心我入佛道廣度衆生所修善根皆悉回向無上正覺讀誦佛正經典者以此大乘了義經教宣說甚深清淨空法由從如來法身所流行者以清淨心愛重大乘受持讀誦書寫供養乃至餘乘所有經典皆是大乘之所流故我亦受持無相違背是故功德得見諸佛九月十九日録訖
